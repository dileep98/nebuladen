name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/nebuladen
            git pull origin main
            cd backend
            npm install
            pm2 restart nebuladen-backend
            echo "Waiting for server to start..."
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed! Backend is running."
            else
              echo "Health check FAILED! Status: $STATUS"
              pm2 logs nebuladen-backend --lines 20
              exit 1
            fi