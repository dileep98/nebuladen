name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Security audit
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Run tests with coverage
        run: |
          cd backend
          npm run test:coverage

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Frontend build check
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://nebuladen.duckdns.org
          NEXT_PUBLIC_WS_URL: wss://nebuladen.duckdns.org

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/nebuladen
            git pull origin main
            cd backend
            npm install
            pm2 restart nebuladen-backend
            echo "Waiting for server to start..."
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed! Backend is running."
            else
              echo "Health check FAILED! Status: $STATUS"
              pm2 logs nebuladen-backend --lines 20
              exit 1
            fi

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        run: |
          echo "Running smoke tests against live backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nebuladen.duckdns.org/health)
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Health check FAILED! Status: $STATUS"
            exit 1
          fi

      - name: Metrics check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nebuladen.duckdns.org/metrics)
          if [ "$STATUS" = "200" ]; then
            echo "Metrics endpoint passed!"
          else
            echo "Metrics endpoint FAILED! Status: $STATUS"
            exit 1
          fi

      - name: Frontend check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://nebuladen.vercel.app)
          if [ "$STATUS" = "200" ]; then
            echo "Frontend check passed!"
          else
            echo "Frontend check FAILED! Status: $STATUS"
            exit 1
          fi

      - name: All smoke tests passed
        run: echo "All systems operational!"