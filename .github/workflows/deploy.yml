name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Security audit
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Run tests
        run: |
          cd backend
          npm run test:coverage

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/nebuladen
            git pull origin main
            cd backend
            npm install
            pm2 restart nebuladen-backend
            echo "Waiting for server to start..."
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed! Backend is running."
            else
              echo "Health check FAILED! Status: $STATUS"
              pm2 logs nebuladen-backend --lines 20
              exit 1
            fi